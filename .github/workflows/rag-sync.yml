name: Update RAG Vector Database

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'  # Only run if files inside the docs directory are modified

jobs:
  sync-vectors:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Vector & AI Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-genai pinecone

    - name: Verify File Location (Debug)
      run: |
        echo "Checking if script exists:"
        ls -la .github/scripts/ || echo "Folder or file not found!"

    - name: Run Ingestion Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
        PINECONE_INDEX_NAME: ${{ secrets.PINECONE_INDEX_NAME }}
      run: |
        echo "Current working directory: $(pwd)"
        echo "Contents of .github/scripts:"
        ls -la .github/scripts/
        python .github/scripts/ingest.py
