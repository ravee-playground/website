name: One-Time Lyft Engineering Crawler

on:
  # Allows you to manually trigger the workflow from the GitHub Actions tab
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    # Grants permissions required to commit the changes back to your repository
    permissions:
      contents: write

    steps:
      # Step 1: Check out your repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up a Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Uses Node 24 LTS
          cache: 'npm'  # Speeds up future runs by caching dependencies
      
      # Step 2.5: Debug
      - name: Debug Node environment
        run: |
          node -v
          npm -v
          pwd
          ls -la
          cat package.json || true

      # Step 3: Install dependencies (axios, cheerio, etc.)
      - name: Install Dependencies
        run: |
          npm install
          npx playwright install chromium --with-deps

      # Step 4: Run your crawler script for Lyft Engineering
      - name: Run Lyft Engineering Crawler Script
        env:
          TARGET_URL: https://eng.lyft.com
        run: node crawl-lyft.js
        
      # Step 4.5: Run the Summarizer
      - name: Run Summarizer Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node summarize-lyft.js

# Step 5: Check if the new summary article changed, and commit it
      - name: Commit and Push Updated Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Stage the specific target files first
          git add ai-summary-lyft.md lyft-summary.md || true

          # Check if there are actual changes staged to commit
          if git diff --cached --quiet; then
            echo "No new data changes to summarize. Skipping commit."
          else
            echo "New synthesized article generated. Committing changes..."
            git commit -m "docs: auto-generate Lyft Engineering crawl summary [skip ci]"
            
            # Stage any leftover accidental modifications (like package logs) 
            # and stash them safely out of the way before pulling.
            git add .
            git stash || true
            
            # FIX: Tell Git that if a conflict occurs on the pull/rebase, 
            # your local runner's newly crawled file always wins ('theirs' in rebase context means your commit)
            git pull --rebase -X theirs origin main
            
            # Pop the changes back out if there were any
            git stash pop || true
            
            # Push the clean, synced commit history back to GitHub
            git push origin main
          fi
