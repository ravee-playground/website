name: Lyft Engineering Crawler & Summarizer

on:
  # Allows manual triggers with an optional toggle to skip the browser crawler phase
  workflow_dispatch:
    inputs:
      skip_crawler:
        description: 'Skip Playwright Scraper? (Only run summarizer)'
        type: boolean
        default: false

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # Step 1: Check out your repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up a Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      
      # Step 2.5: Debug
      - name: Debug Node environment
        run: |
          node -v
          npm -v
          pwd
          ls -la
          cat package.json || true

      # Step 3: Install dependencies
      - name: Install Dependencies
        run: |
          npm install
          if [ "${{ inputs.skip_crawler }}" != "true" ]; then
            npx playwright install chromium --with-deps
          fi

      # Step 4: Run your crawler script for Lyft Engineering (Skippable)
      - name: Run Lyft Engineering Crawler Script
        if: ${{ inputs.skip_crawler != true }}
        env:
          TARGET_URL: https://eng.lyft.com
        run: node crawl-lyft.js
        
      # Step 4.5: Run the Summarizer (Always runs)
      - name: Run Summarizer Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node summarize-lyft.js

      # Step 5: Check if any output files changed, and safely commit them
      - name: Commit and Push Updated Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Stage target files first
          git add ai-summary-lyft.md lyft-summary.md || true

          # Evaluate staged status
          if git diff --cached --quiet; then
            echo "No data changes to summarize. Skipping commit."
          else
            echo "New content variants generated. Committing changes..."
            git commit -m "docs: auto-generate Lyft Engineering crawl summary [skip ci]"
            
            # Stash any external runtime modifications (e.g. log updates)
            git add .
            git stash || true
            
            # Rebase from origin using our forced-override conflict solution
            git pull --rebase -X theirs origin main
            
            # Pop the stashed changes back out safely
            git stash pop || true
            
            # Finalize push to main
            git push origin main
          fi
