<script>
(function() {
  function initChatbot() {
    const toggleBtn = document.getElementById('chat-toggle');
    const sendBtn = document.getElementById('chat-send');
    const chatWindow = document.getElementById('chat-window');
    const input = document.getElementById('chat-input');
    const messages = document.getElementById('chat-messages');

    // Fail-safe check
    if (!toggleBtn || !sendBtn || !chatWindow || !input || !messages) return;

    // 1. Toggle visibility
    toggleBtn.addEventListener('click', function() {
      chatWindow.style.display = chatWindow.style.display === 'none' ? 'flex' : 'none';
    });

    // 2. Click to send
    sendBtn.addEventListener('click', sendQuestion);

    // 3. Enter key to send
    input.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        sendQuestion();
      }
    });

    async function sendQuestion() {
      const question = input.value.trim();
      if (!question) return;

      messages.innerHTML += `<div style="margin-bottom: 10px; text-align: right;"><b>You:</b> ${question}</div>`;
      input.value = '';
      
      const loadingId = 'loading-' + Date.now();
      messages.innerHTML += `<div id="${loadingId}" style="margin-bottom: 10px; color: #777;"><b>AI:</b> Thinking...</div>`;
      messages.scrollTop = messages.scrollHeight;

      try {
        const res = await fetch('https://thetechnicalwriter.workers.dev/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question })
        });
        const data = await res.json();
        
        const loadingEl = document.getElementById(loadingId);
        if (loadingEl) loadingEl.remove();
        messages.innerHTML += `<div style="margin-bottom: 10px;"><b>AI:</b> ${data.answer}</div>`;
      } catch (err) {
        const loadingEl = document.getElementById(loadingId);
        if (loadingEl) loadingEl.remove();
        messages.innerHTML += `<div style="margin-bottom: 10px; color: red;"><b>Error:</b> Could not reach chat assistant.</div>`;
      }
      messages.scrollTop = messages.scrollHeight;
    }
  }

  // Bypasses the timing issue: Run immediately if the DOM is already parsed
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initChatbot);
  } else {
    initChatbot();
  }
})();
</script>
