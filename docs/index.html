<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Technical Writer</title>
    <style>
    /* Color variables for Light Mode (Default) */
    :root {
        --bg-body: #ffffff;
        --border-color: #e1e4e8;
        --text-primary: #333333;
        --hover-color: #e4e8ed;
    }

    /* Color variables for Dark Mode */
    .dark-mode {
        --bg-body: #1e1e1e;
        --border-color: #3c3c3c;
        --text-primary: #ffffff;
        --hover-color: #37373d;
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background-color: var(--bg-body);
        color: var(--text-primary);
        transition: background-color 0.2s, color 0.2s;
    }

    /* Theme Toggle Button Style */
    #theme-toggle {
        position: absolute;
        top: 20px;
        right: 20px;
        background: none;
        border: 1px solid var(--border-color);
        padding: 8px 14px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
        color: var(--text-primary);
        background-color: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(5px);
        transition: background-color 0.2s, border-color 0.2s, color 0.2s;
        z-index: 10;
    }

    .dark-mode #theme-toggle {
        border-color: var(--border-color);
        color: var(--text-primary);
    }
        
    #theme-toggle:hover {
        background-color: var(--hover-color);
        border-color: var(--accent-color);
    }

    /* Image Placeholder Style */
    .image-container {
        width: 75vw;
        height: auto;
        display: flex;
    }
    /* Ensure both images scale perfectly */
    .responsive-image {
        max-width: 100%;
        max-height: 100%;
        width: 100%;
        height: auto;
        object-fit: contain; /* Preserve aspect ratio, show full image */
        display: block;
    }

        /* Logic: Hide the light mode image when body IS dark-mode */
    .dark-mode #image-light {
        display: none;
    }

    /* Logic: Hide the dark mode image when body IS NOT dark-mode (default) */
    body:not(.dark-mode) #image-dark {
        display: none;
    }
</style>
</head>
<body>

<button id="theme-toggle">☀️ Light</button>

    <div class="image-container">
        <img id="image-light" 
             src="techwriter_light.png" 
             alt="The frustrated Grammar Cop (Light Mode)" 
             class="responsive-image">

        <img id="image-dark" 
             src="techwriter.png" 
             alt="The frustrated Grammar Cop (Dark Mode)" 
             class="responsive-image">
    </div>

    <script>
        const themeToggle = document.getElementById('theme-toggle');

        themeToggle.addEventListener('click', () => {
            // 1. Toggle the class on the body (this handles color variables AND image visibility via CSS)
            document.body.classList.toggle('dark-mode');

            // 2. Update the button visual label text
            if (document.body.classList.contains('dark-mode')) {
                themeToggle.textContent = '🌙 Lights out';
            } else {
                themeToggle.textContent = '☀️ Lights on';
            }
        });
    </script>
<!-- Fun Right-Click Popup -->
<div id="custom-popup" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #ff4757; color: white; padding: 20px 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 10000; font-family: sans-serif; text-align: center; border: 4px solid white;">
    <h2 style="margin: 0 0 10px 0;">🛑 Ah, ah, ah 🛑</h2>
    <p style="margin: 0 0 15px 0;">No right-clicking allowed! This recipe is top secret. 🕵️‍♂️</p>
    <button onclick="closePopup()" style="background: white; color: #ff4757; border: none; padding: 8px 20px; font-weight: bold; border-radius: 20px; cursor: pointer;">My Bad!</button>
</div>

<script>
    // Detect right-click
    document.addEventListener('contextmenu', function(e) {
        e.preventDefault(); // Blocks the default browser menu
        document.getElementById('custom-popup').style.display = 'block';
    });

    // Close the popup
    function closePopup() {
        document.getElementById('custom-popup').style.display = 'none';
    }
</script>



    
</body>
</html>
