<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentation Browser</title>
    <style>
    /* Color variables for Light Mode (Default) */
    :root {
        --bg-body: #ffffff;
        --border-color: #e1e4e8;
        --text-primary: #333333;
        --hover-color: #e4e8ed;
    }

    /* Color variables for Dark Mode */
    .dark-mode {
        --bg-body: #1e1e1e;
        --border-color: #3c3c3c;
        --text-primary: #ffffff;
        --hover-color: #37373d;
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background-color: var(--bg-body);
        color: var(--text-primary);
        transition: background-color 0.2s, color 0.2s;
    }

    /* Theme Toggle Button Style */
    #theme-toggle {
        position: absolute;
        top: 20px;
        right: 20px;
        background: none;
        border: 1px solid var(--border-color);
        padding: 8px 14px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
        color: var(--text-primary);
        background-color: var(--bg-body);
        transition: background-color 0.2s, border-color 0.2s;
    }

    #theme-toggle:hover {
        background-color: var(--hover-color);
    }

    /* Image Placeholder Style */
    .image-placeholder {
        width: 400px;
        height: 300px;
        max-width: 90%;
        border: 2px dashed var(--border-color);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--border-color);
        font-weight: 500;
        background-color: rgba(0, 0, 0, 0.02);
    }
    .dark-mode .image-placeholder {
        background-color: rgba(255, 255, 255, 0.02);
    }
</style>
</head>
<body>

    <button id="theme-toggle">🌙 Dark</button>

    <div class="image-placeholder">
        <img src="techwriter.png" alt="Placeholder pic" style="max-width: 100%; max-height: 100%; object-fit: contain;">
    </div>

    <script>
        const themeToggle = document.getElementById('theme-toggle');

        themeToggle.addEventListener('click', () => {
            // Toggle the class on the body element
            document.body.classList.toggle('dark-mode');

            // Update the button visual label text
            if (document.body.classList.contains('dark-mode')) {
                themeToggle.textContent = '☀️ Light';
            } else {
                themeToggle.textContent = '🌙 Dark';
            }
        });
    </script>

</body>
</html>
